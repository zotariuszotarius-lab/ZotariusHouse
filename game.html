<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zotarius Runner</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

canvas {
  background: #111;
  display: block;
  margin: auto;
}

h1 {
  margin-top: 10px;
}
</style>
</head>
<body>

<h1>Zotarius Runner</h1>
<canvas id="game" width="800" height="200"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x: 50, y: 150, width: 20, height: 20, dy: 0, jump: false };
let gravity = 0.6;
let obstacles = [];
let score = 0;

function spawnObstacle() {
  obstacles.push({ x: 800, y: 160, width: 20, height: 40 });
}

setInterval(spawnObstacle, 2000);

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Player
  player.dy += gravity;
  player.y += player.dy;

  if (player.y > 150) {
    player.y = 150;
    player.dy = 0;
    player.jump = false;
  }

  ctx.fillStyle = "#00ff00";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Obstacles
  ctx.fillStyle = "red";
  for (let i = 0; i < obstacles.length; i++) {
    obstacles[i].x -= 5;
    ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

    // Collision
    if (
      player.x < obstacles[i].x + obstacles[i].width &&
      player.x + player.width > obstacles[i].x &&
      player.y < obstacles[i].y + obstacles[i].height &&
      player.y + player.height > obstacles[i].y
    ) {
      alert("Game Over ! Score: " + score);
      document.location.reload();
    }
  }

  score++;
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 700, 20);

  requestAnimationFrame(update);
}

function jump() {
  if (!player.jump) {
    player.dy = -12;
    player.jump = true;
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

document.addEventListener("click", jump);

update();
</script>

</body>
</html>
