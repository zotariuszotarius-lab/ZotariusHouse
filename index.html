<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zotarius - Accès</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#joinBtn {
  position: relative;
  padding: 15px 40px;
  font-size: 22px;
  background: #00ff00;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: none;
  transition: 0.3s;
}

#joinBtn:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div style="position: relative; display: flex; gap: 20px;">

<div id="buttons" style="position: relative; display: none; gap: 20px;">

  <button onclick="window.location.href='page2.html'" style="
    padding: 15px 40px;
    font-size: 22px;
    background: #00ff00;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;">
    S'inscrire
  </button>

  <button onclick="window.location.href='game.html'" style="
    padding: 15px 40px;
    font-size: 22px;
    background: #00ff00;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;">
    Jouer
  </button>

</div>

  <button onclick="window.location.href='game.html'" style="
    padding: 15px 40px;
    font-size: 22px;
    background: #00ff00;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;">
    Jouer
  </button>

</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];

for(let x = 0; x < columns; x++)
    drops[x] = 1;

function draw(){
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);

setTimeout(() => {
  document.getElementById("buttons").style.display = "flex";
}, 5000);
  document.getElementById("joinBtn").style.display = "block";
}, 5000);
</script>

</body>
</html>
